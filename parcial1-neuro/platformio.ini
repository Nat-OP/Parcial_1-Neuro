; --- Entorno para la ESP32-S3 Super Mini (La del WiFi) ---
[env:esp32-s3-super-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = default.csv
monitor_speed = 115200
lib_deps = adafruit/Adafruit NeoPixel @ ^1.12.0

; --- Entorno para la ESP32 Master (La de 38 pines) ---
[env:esp32-master]
platform = espressif32
board = esp32dev ; La placa de 38 pines usa el ESP32 estandar
framework = arduino
monitor_speed = 115200